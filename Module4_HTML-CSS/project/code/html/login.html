<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description"
            content="Tachette is a task management app that combines self care and productivity. It helps you manage your tasks while also reminding you to take care of yourself. With Tachette, you can create to-do lists, set reminders for self care activities, and track your progress. Whether you're looking to boost your productivity or prioritize your well-being, Tachette has got you covered.">
        <meta name="keywords" content="task management, self care, to do">
        <title>Login (Tachette)</title>
    </head>

    <body>
        <header>
            <div>
                <h1>
                    Tachette
                </h1>
            </div>
            <nav>
                <ul>
                    <li>
                        <a href="index.html">Home</a>
                    </li>
                    <li>
                        <a href="tasks.html">Tasks</a>
                    </li>
                    <li>
                        <a href="login.html">Login</a>
                    </li>
                    <li>
                        <a href="caccount.html">Create Account</a>
                    </li>
                </ul>
            </nav>
        </header>
        <main>
            <section>
                <h1>
                    Sign In
                </h1>
            </section>
            <section>
                <form>
                    <div>
                        <label for="email_username">Email:</label>
                        <input type="email" id="email_username" name="email_username" required>
                    </div>
                    <div>
                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit">Login</button>
                </form>
                <div>
                    <span>
                        Forgot password: <a href="#" id="reset-pwd">Click Here</a>
                    </span>
                    <span>
                        Create account: <a href="caccount.html">Click Here</a>
                    </span>
                </div>
            </section>
        </main>
        <footer>
            <p>
                &copy; 2026 David H. Watson. All rights reserved.
            </p>
        </footer>

    </body>

</html>
