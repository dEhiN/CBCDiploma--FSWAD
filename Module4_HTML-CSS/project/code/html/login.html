<!DOCTYPE html>
<html lang="en">

    <head>
        <!-- Head section with meta tags for charset, viewport, site description, and SEO keywords. -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description"
            content="Tachette is a task management app that combines self care and productivity. It helps you manage your tasks while also reminding you to take care of yourself. With Tachette, you can create to-do lists, set reminders for self care activities, and track your progress. Whether you're looking to boost your productivity or prioritize your well-being, Tachette has got you covered.">
        <meta name="keywords" content="task management, self care, to do">
        <title>Login (Tachette)</title>
        <!-- Link the main CSS for common styling and the specific page CSS-->
        <link rel="stylesheet" href="../css/main.css">
        <link rel="stylesheet" href="../css/forms.css">
        <link rel="stylesheet" href="../css/login.css">
    </head>

    <body>
        <header>
            <!-- Header section of body which consists of div to contain app name and nav section -->
            <div class="app-name">
                <h1>
                    Tachette
                </h1>
            </div>
            <nav>
                <!-- Hamburger menu
                    NOTE: I used GitHub Copilot to generate this code!!
                -->
                <input type="checkbox" id="nav-toggle" class="nav-toggle">
                <label for="nav-toggle" class="nav-toggle-label">
                    <span></span>
                    <span></span>
                    <span></span>
                </label>
                <ul class="nav-list">
                    <li>
                        <a href="index.html" class="nav-link">Home</a>
                    </li>
                    <li>
                        <a href="tasks.html" class="nav-link">Tasks</a>
                    </li>
                    <li>
                        <a href="login.html" class="nav-link">Login</a>
                    </li>
                    <li>
                        <a href="caccount.html" class="nav-link">Create Account</a>
                    </li>
                </ul>
            </nav>
        </header>
        <main>
            <section class="section-title">
                <!-- First body section to show the page title -->
                <h1>
                    Sign In
                </h1>
            </section>
            <section class="section-form">
                <!-- Second body section which contains the login form-->
                <form class="form-create-account">
                    <div class="form-element">
                        <label for="email_username">Email:</label>
                        <input type="email" id="email_username" name="email_username" required>
                    </div>
                    <div class="form-element">
                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <div class="form-element submit-btn-div">
                    <button type="submit" class="create-account-btn">Login</button></div>
                </form>
                <div class="form-links-div">
                    <!-- A separate div container with links for the user if they forgot their password or need to create an account.
                    Currently, the forgot password link isn't set up. 
                -->
                    <span>
                        Forgot password: <a href="#" id="reset-pwd">Click Here</a>
                    </span>
                    <span>
                        Create account: <a href="caccount.html">Click Here</a>
                    </span>
                </div>
            </section>
        </main>
        <footer>
            <!-- Footer section which just contains a copyright notice.
                There are no social media links (which are on the wireframe)
                because there is no social media presence for this app.
            -->
            <p>
                &copy; 2026 David H. Watson. All rights reserved.
            </p>
        </footer>

    </body>

</html>
