<!DOCTYPE html>
<html lang="en">

    <head>
        <!-- Head section with meta tags for charset, viewport, site description, and SEO keywords. -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description"
            content="Tachette is a task management app that combines self care and productivity. It helps you manage your tasks while also reminding you to take care of yourself. With Tachette, you can create to-do lists, set reminders for self care activities, and track your progress. Whether you're looking to boost your productivity or prioritize your well-being, Tachette has got you covered.">
        <meta name="keywords" content="task management, self care, to do">
        <title>Create Account (Tachette)</title>
        <!-- Link the main CSS for common styling and the specific page CSS-->
        <link rel="stylesheet" href="../css/main.css">
        <link rel="stylesheet" href="../css/caccount.css">
    </head>

    <body>
        <header>
            <!-- Header section of body which consists of div to contain app name and nav section -->
            <div class="app-name">
                <h1>
                    Tachette
                </h1>
            </div>
            <nav>
                <!-- Hamburger menu
                    NOTE: I used GitHub Copilot to generate this code!!
                -->
                <input type="checkbox" id="nav-toggle" class="nav-toggle">
                <label for="nav-toggle" class="nav-toggle-label">
                    <span></span>
                    <span></span>
                    <span></span>
                </label>
                <ul class="nav-list">
                    <li>
                        <a href="index.html" class="nav-link">Home</a>
                    </li>
                    <li>
                        <a href="tasks.html" class="nav-link">Tasks</a>
                    </li>
                    <li>
                        <a href="login.html" class="nav-link">Login</a>
                    </li>
                    <li>
                        <a href="caccount.html" class="nav-link">Create Account</a>
                    </li>
                </ul>
            </nav>
        </header>
        <main>
            <!-- First body section to show the page title -->
            <section>
                <h1>
                    Tasks
                </h1>
            </section>
            <section>
                <!-- Second body section which contains a form to create an account-->
                <form>
                    <div>
                        <label for="email_username">Please enter your email address:</label>
                        <input type="email" id="email_username" name="email_username">
                    </div>
                    <div>
                        <label for="password">Please enter your password:</label>
                        <input type="password" id="password" name="password">
                    </div>
                    <div>
                        <label for="password_confirm">Please enter your password again:</label>
                        <input type="password" id="password_confirm" name="password_confirm">
                    </div>
                    <div>
                        <label for="user_fullname">Please enter your name:</label>
                        <input type="text" id="user_fullname" name="user_fullname">
                    </div>
                    <button type="submit">Create Account</button>
                </form>
                <div>
                    <!-- A separate div container with links for the user if they already have an account -->
                    <span>
                        Already have an account? <a href="#" id="reset-pwd">Click Here</a>
                    </span>
                </div>
            </section>
        </main>
        <footer>
            <!-- Footer section which just contains a copyright notice.
                There are no social media links (which are on the wireframe)
                because there is no social media presence for this app.
            -->
            <p>
                &copy; 2026 David H. Watson. All rights reserved.
            </p>
        </footer>

    </body>

</html>
